<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>「100歳で使い切る」資産シミュレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e5e3df;
    --text: #1c1b18;
    --text-mid: #5c5a55;
    --text-dim: #9c9a94;
    --grow: #2563eb;
    --grow-soft: rgba(37,99,235,0.07);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans JP', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 840px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
  }

  /* ── Header ── */
  header { margin-bottom: 2.5rem; }

  header h1 {
    font-size: clamp(1.3rem, 3.5vw, 1.65rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.35;
    margin-bottom: 0.35rem;
  }

  header .sub {
    color: var(--text-dim);
    font-size: 0.8rem;
    font-weight: 400;
    line-height: 1.65;
  }

  /* ── Input ── */
  .inputs {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem 1.75rem;
    margin-bottom: 1.5rem;
  }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1.5rem;
  }

  @media (max-width: 600px) {
    .input-row { grid-template-columns: 1fr; gap: 1.1rem; }
    .inputs { padding: 1.25rem; }
  }

  .field label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.4rem;
  }

  .field-name {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-mid);
  }

  .field-val {
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text);
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--grow);
    border: 3px solid var(--surface);
    box-shadow: 0 0 0 1px var(--grow), 0 1px 4px rgba(0,0,0,0.1);
  }

  input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--grow);
    border: 3px solid var(--surface);
    cursor: pointer;
  }

  /* ── Rate switcher ── */
  .rate-bar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .rate-label {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-mid);
    margin-right: 0.25rem;
  }

  .rate-btn {
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 500;
    padding: 0.4rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.15s;
  }

  .rate-btn:hover {
    border-color: var(--grow);
    color: var(--grow);
  }

  .rate-btn.active {
    background: var(--grow);
    border-color: var(--grow);
    color: #fff;
  }

  /* ── Chart ── */
  .chart-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem 1.25rem 1rem;
    margin-bottom: 1.5rem;
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .chart-header h2 { font-size: 0.88rem; font-weight: 600; }

  .chart-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 0.85rem;
    font-size: 0.65rem;
    color: var(--text-dim);
  }

  .chart-legend span { display: flex; align-items: center; gap: 4px; }

  .swatch {
    width: 14px; height: 3px;
    border-radius: 2px;
    display: inline-block;
  }

  .canvas-wrap {
    position: relative;
    width: 100%;
    height: 400px;
  }

  @media (max-width: 600px) { .canvas-wrap { height: 300px; } }

  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* ── Results ── */
  .results {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    overflow-x: auto;
  }

  .results h3 {
    font-size: 0.82rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
    color: var(--text-mid);
  }

  .rtable {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
    white-space: nowrap;
  }

  .rtable th {
    text-align: left;
    font-weight: 500;
    font-size: 0.66rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    padding: 0.45rem 0.7rem;
    border-bottom: 1px solid var(--border);
  }

  .rtable td {
    padding: 0.55rem 0.7rem;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 0.76rem;
  }

  .rtable tr:last-child td { border-bottom: none; }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 0.4rem;
    vertical-align: middle;
  }

  .bold { font-weight: 600; color: var(--text); }
  .dim { color: var(--text-dim); }

  .footnote {
    text-align: center;
    font-size: 0.66rem;
    color: var(--text-dim);
    line-height: 1.7;
    margin-top: 2rem;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  header, .inputs, .rate-bar, .chart-section, .results, .footnote {
    animation: fadeIn 0.35s ease-out both;
  }
  .inputs { animation-delay: 0.03s; }
  .rate-bar { animation-delay: 0.05s; }
  .chart-section { animation-delay: 0.08s; }
  .results { animation-delay: 0.11s; }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>「100歳で使い切る」資産シミュレーター</h1>
    <p class="sub">積み立てと取り崩し、2つの曲線の交点があなたのリタイア年齢です。</p>
  </header>

  <div class="inputs">
    <div class="input-row">
      <div class="field">
        <label>
          <span class="field-name">現在の年齢</span>
          <span class="field-val" id="v_age"></span>
        </label>
        <input type="range" id="in_age" min="20" max="60" value="30">
      </div>
      <div class="field">
        <label>
          <span class="field-name">現在の資産額</span>
          <span class="field-val" id="v_asset"></span>
        </label>
        <input type="range" id="in_asset" min="0" max="10000" step="50" value="500">
      </div>
      <div class="field">
        <label>
          <span class="field-name">毎月の積立額</span>
          <span class="field-val" id="v_save"></span>
        </label>
        <input type="range" id="in_save" min="1" max="50" step="0.5" value="10">
      </div>
    </div>
  </div>

  <div class="rate-bar">
    <span class="rate-label">想定リターン：</span>
    <button class="rate-btn" data-rate="4">年率 4%</button>
    <button class="rate-btn active" data-rate="8">年率 8%</button>
    <button class="rate-btn" data-rate="12">年率 12%</button>
    <button class="rate-btn" data-rate="16">年率 16%</button>
  </div>

  <div class="chart-section">
    <div class="chart-header">
      <h2>資産推移</h2>
      <div class="chart-legend" id="legend"></div>
    </div>
    <div class="canvas-wrap">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <div class="results">
    <h3 id="resultsTitle">取り崩しプラン — 交点 = リタイア可能年齢</h3>
    <table class="rtable">
      <thead>
        <tr>
          <th>取り崩し額</th>
          <th>必要資産</th>
          <th>リタイア年齢</th>
          <th>あと何年</th>
        </tr>
      </thead>
      <tbody id="resultBody"></tbody>
    </table>
  </div>

  <div class="footnote">
    税金・インフレ・手数料は考慮していません。運用リターンは一定と仮定した簡易シミュレーションです。
  </div>

</div>

<script>
const TARGET_AGE = 100;
const DRAWDOWNS = [
  { amount: 20, color: '#16a163', label: '20万/月' },
  { amount: 25, color: '#2563eb', label: '25万/月' },
  { amount: 30, color: '#7c3aed', label: '30万/月' },
  { amount: 35, color: '#ea580c', label: '35万/月' },
  { amount: 40, color: '#dc2626', label: '40万/月' },
];

const $ = id => document.getElementById(id);
const ins = { age: $('in_age'), asset: $('in_asset'), save: $('in_save') };
let activeRate = 8;

function fmtMan(v) {
  const n = Math.round(Number(v));
  if (n >= 10000) return (n / 10000).toFixed(n % 10000 === 0 ? 0 : 1) + '億円';
  return n.toLocaleString() + '万円';
}

// ── 計算 ──
function compute() {
  const ageNow = +ins.age.value;
  const curAsset = +ins.asset.value;
  const monthlySave = +ins.save.value;
  const annualRate = activeRate / 100;
  const mr = annualRate / 12;
  const totalMonths = (TARGET_AGE - ageNow) * 12;

  // 線A: 形成線 (左→右、右肩上がり)
  // growLine[m] = m月後の資産 (積み立て続けた場合)
  const growLine = new Float64Array(totalMonths + 1);
  growLine[0] = curAsset;
  for (let m = 1; m <= totalMonths; m++) {
    growLine[m] = growLine[m - 1] * (1 + mr) + monthlySave;
  }

  // 線B群: 取り崩し線 (100歳0円から左に逆算)
  // drawLine[dd][m] = 「m月目の時点で、ここから取り崩し始めて100歳で0円になるために必要な資産」
  // drawLine[dd][totalMonths] = 0 (100歳 = 0円)
  // drawLine[dd][m] = (drawLine[dd][m+1] + dd.amount) / (1 + mr)
  const plans = [];

  for (const dd of DRAWDOWNS) {
    const drawLine = new Float64Array(totalMonths + 1);
    drawLine[totalMonths] = 0;
    for (let m = totalMonths - 1; m >= 0; m--) {
      drawLine[m] = (drawLine[m + 1] + dd.amount) / (1 + mr);
    }

    // 交点を探す: growLine[m] >= drawLine[m] となる最初の月
    let crossMonth = -1;
    for (let m = 0; m <= totalMonths; m++) {
      if (growLine[m] >= drawLine[m]) {
        crossMonth = m;
        break;
      }
    }

    plans.push({
      ...dd,
      drawLine,
      crossMonth,
      crossAge: crossMonth >= 0 ? ageNow + crossMonth / 12 : null,
      neededAsset: crossMonth >= 0 ? Math.round(drawLine[crossMonth]) : null,
      feasible: crossMonth >= 0,
    });
  }

  return { ageNow, totalMonths, growLine, plans };
}

// ── チャート描画 ──
function drawChart(data) {
  const { ageNow, totalMonths, growLine, plans } = data;
  const canvas = $('chart');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  ctx.clearRect(0, 0, W, H);

  const pad = { top: 20, right: 20, bottom: 36, left: 56 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  // 表示範囲 — Y軸は取り崩し線の最大値に合わせる（形成線は含めない）
  const minAge = ageNow;
  const maxAge = TARGET_AGE;
  let maxAsset = 100;
  for (const p of plans) {
    if (p.drawLine[0] > maxAsset) maxAsset = p.drawLine[0]; // 左端が最大
  }
  // 形成線は最も遅い交点までしか描かないので、その範囲の最大値も考慮
  let lastCrossMonth = 0;
  for (const p of plans) {
    if (p.feasible && p.crossMonth > lastCrossMonth) lastCrossMonth = p.crossMonth;
  }
  // 交点がない場合は全月チェック
  if (lastCrossMonth === 0) lastCrossMonth = totalMonths;
  for (let m = 0; m <= lastCrossMonth; m++) {
    if (growLine[m] > maxAsset) maxAsset = growLine[m];
  }
  // 余裕を持たせて切り上げ
  if (maxAsset >= 10000) maxAsset = Math.ceil(maxAsset / 2000) * 2000;
  else if (maxAsset >= 1000) maxAsset = Math.ceil(maxAsset / 500) * 500;
  else maxAsset = Math.ceil(maxAsset / 100) * 100;

  const xPos = age => pad.left + ((age - minAge) / (maxAge - minAge)) * cw;
  const yPos = asset => pad.top + ch - (Math.max(asset, 0) / maxAsset) * ch;
  const mToAge = m => ageNow + m / 12;

  // グリッド
  ctx.strokeStyle = '#eeedea';
  ctx.lineWidth = 1;
  const yTicks = 5;
  for (let i = 0; i <= yTicks; i++) {
    const yy = pad.top + (ch / yTicks) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, yy); ctx.lineTo(W - pad.right, yy); ctx.stroke();
  }

  // Y軸ラベル
  ctx.fillStyle = '#a09e99';
  ctx.font = '10px "IBM Plex Mono", monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let i = 0; i <= yTicks; i++) {
    const val = maxAsset - (maxAsset / yTicks) * i;
    const yy = pad.top + (ch / yTicks) * i;
    let label;
    if (val >= 10000) label = (val/10000).toFixed(val%10000===0?0:1) + '億';
    else if (val >= 1000) label = (val/1000).toFixed(val%1000===0?0:1) + '千万';
    else label = Math.round(val) + '万';
    ctx.fillText(label, pad.left - 8, yy);
  }

  // X軸ラベル
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const ageStep = (maxAge - minAge) > 50 ? 10 : 5;
  for (let a = Math.ceil(minAge / ageStep) * ageStep; a <= maxAge; a += ageStep) {
    ctx.fillStyle = '#a09e99';
    ctx.fillText(a + '歳', xPos(a), pad.top + ch + 8);
    ctx.strokeStyle = '#f3f2ef'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(xPos(a), pad.top); ctx.lineTo(xPos(a), pad.top + ch); ctx.stroke();
  }

  // サンプリング
  const step = Math.max(1, Math.floor(totalMonths / 500));

  // ── 取り崩し線を描画（後ろから前に、薄い順） ──
  for (const p of [...plans].reverse()) {
    ctx.beginPath();
    ctx.strokeStyle = p.color + '55';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 3]);
    ctx.lineJoin = 'round';
    let first = true;
    for (let m = 0; m <= totalMonths; m += step) {
      const px = xPos(mToAge(m)), py = yPos(p.drawLine[m]);
      first ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      first = false;
    }
    ctx.lineTo(xPos(TARGET_AGE), yPos(0));
    ctx.stroke();
    ctx.setLineDash([]);

    // ラベル（左端付近）
    const labelM = Math.min(Math.floor(totalMonths * 0.03), 24);
    ctx.save();
    ctx.fillStyle = p.color;
    ctx.font = '600 9px "IBM Plex Mono", monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText(p.label, xPos(mToAge(labelM)) + 2, yPos(p.drawLine[labelM]) - 4);
    ctx.restore();
  }

  // ── 形成線を描画（最も遅い交点まで＋少し余裕） ──
  const growEndMonth = Math.min(lastCrossMonth + Math.floor(totalMonths * 0.05), totalMonths);

  // エリア
  ctx.beginPath();
  ctx.moveTo(xPos(minAge), yPos(0));
  for (let m = 0; m <= growEndMonth; m += step) ctx.lineTo(xPos(mToAge(m)), yPos(growLine[m]));
  ctx.lineTo(xPos(mToAge(growEndMonth)), yPos(growLine[growEndMonth]));
  ctx.lineTo(xPos(mToAge(growEndMonth)), yPos(0));
  ctx.closePath();
  const grd = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
  grd.addColorStop(0, 'rgba(37,99,235,0.08)');
  grd.addColorStop(1, 'rgba(37,99,235,0.01)');
  ctx.fillStyle = grd;
  ctx.fill();

  // ライン
  ctx.beginPath();
  ctx.strokeStyle = '#2563eb';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  let first = true;
  for (let m = 0; m <= growEndMonth; m += step) {
    const px = xPos(mToAge(m)), py = yPos(growLine[m]);
    first ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    first = false;
  }
  ctx.lineTo(xPos(mToAge(growEndMonth)), yPos(growLine[growEndMonth]));
  ctx.stroke();

  // 形成線ラベル
  ctx.save();
  ctx.fillStyle = '#2563eb';
  ctx.font = '600 9.5px "IBM Plex Mono", monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('資産形成', xPos(mToAge(growEndMonth)) - 4, yPos(growLine[growEndMonth]) - 6);
  ctx.restore();

  // ── 交点マーカー ──
  for (const p of plans) {
    if (!p.feasible) continue;
    const cx = xPos(p.crossAge);
    const cy = yPos(p.drawLine[p.crossMonth]);

    // 縦点線
    ctx.save();
    ctx.strokeStyle = p.color + '40';
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 2]);
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, yPos(0)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // ドット
    ctx.beginPath();
    ctx.arc(cx, cy, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 2;
    ctx.stroke();

    // 年齢ラベル
    ctx.save();
    ctx.fillStyle = p.color;
    ctx.font = '600 9px "IBM Plex Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(Math.round(p.crossAge) + '歳', cx, cy - 8);
    ctx.restore();
  }
}

// ── レジェンド ──
function updateLegend() {
  const el = $('legend');
  let html = '<span><i class="swatch" style="background:#2563eb"></i>資産形成</span>';
  for (const d of DRAWDOWNS) {
    html += `<span><i class="swatch" style="background:${d.color}"></i>${d.label}</span>`;
  }
  el.innerHTML = html;
}

// ── テーブル ──
function updateTable(data) {
  const { ageNow, plans } = data;
  $('resultBody').innerHTML = plans.map(p => {
    if (!p.feasible) return `<tr>
      <td><span class="dot" style="background:${p.color}"></span>${p.amount}万円/月</td>
      <td class="dim" colspan="3">到達できません</td></tr>`;
    const yrs = Math.round(p.crossAge - ageNow);
    return `<tr>
      <td><span class="dot" style="background:${p.color}"></span>${p.amount}万円/月</td>
      <td class="dim">${fmtMan(p.neededAsset)}</td>
      <td class="bold">${Math.round(p.crossAge * 10) / 10}歳</td>
      <td class="dim">${yrs}年</td></tr>`;
  }).join('');
}

// ── メイン更新 ──
function update() {
  $('v_age').textContent = ins.age.value + '歳';
  $('v_asset').textContent = fmtMan(ins.asset.value);
  $('v_save').textContent = ins.save.value + '万円/月';

  const data = compute();
  drawChart(data);
  updateTable(data);
}

// ── イベント ──
for (const el of Object.values(ins)) el.addEventListener('input', update);

document.querySelectorAll('.rate-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.rate-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeRate = +btn.dataset.rate;
    update();
  });
});

let rt;
window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(update, 80); });

updateLegend();
update();
</script>
</body>
</html>
