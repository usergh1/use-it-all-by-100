<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>「100歳で0円にする」資産シミュレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e5e3df;
    --text: #1c1b18;
    --text-mid: #5c5a55;
    --text-dim: #9c9a94;
    --grow: #2563eb;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans JP', -apple-system, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    max-width: 840px;
    margin: 0 auto;
    padding: 1.5rem 1rem 4rem;
  }

  /* ── Main card (chart + table) ── */
  .main-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem 1.25rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  .main-header {
    text-align: center;
    margin-bottom: 1.25rem;
  }
  .main-header h1 {
    font-size: clamp(1.1rem, 3.5vw, 1.45rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.35;
    margin-bottom: 0.25rem;
  }
  .main-header .sub {
    color: var(--text-dim);
    font-size: 0.75rem;
    font-weight: 400;
    line-height: 1.5;
  }

  /* Legend */
  .chart-legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.4rem 0.75rem;
    font-size: 0.6rem;
    font-family: var(--mono);
    color: var(--text-dim);
    margin-bottom: 0.75rem;
  }
  .chart-legend span { display:flex; align-items:center; gap:4px; }
  .swatch { width:14px; height:3px; border-radius:2px; display:inline-block; }
  .swatch-dash { width:14px; height:0; border-top:2px dashed; display:inline-block; }

  /* Canvas */
  .canvas-wrap {
    position: relative;
    width: 100%;
    height: 380px;
  }
  @media (max-width:600px) { .canvas-wrap { height: 300px; } }
  canvas {
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
  }

  /* Results table inside main card */
  .results-inner {
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  .section-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.6rem;
  }
  .rtable {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
    white-space: nowrap;
  }
  .rtable th {
    text-align: left;
    font-weight: 500;
    font-size: 0.64rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    padding: 0.4rem 0.6rem;
    border-bottom: 1px solid var(--border);
  }
  .rtable td {
    padding: 0.5rem 0.6rem;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 0.74rem;
  }
  .rtable tr:last-child td { border-bottom:none; }
  .dot {
    width:10px; height:10px;
    border-radius:50%;
    display:inline-block;
    margin-right:0.4rem;
    vertical-align:middle;
  }
  .bold { font-weight:600; color:var(--text); }
  .dim { color:var(--text-dim); }

  /* ── Input card (bottom) ── */
  .inputs {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem 1.75rem;
    margin-bottom: 1.5rem;
  }
  @media (max-width:600px) { .inputs { padding: 1.25rem; } }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1.5rem;
  }
  @media (max-width:600px) {
    .input-row { grid-template-columns: 1fr; gap: 1.1rem; }
  }

  .field label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.4rem;
  }
  .field-name {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-mid);
  }
  .field-val {
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text);
  }
  .field-range {
    display: block;
    font-size: 0.63rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width:18px; height:18px;
    border-radius:50%;
    background: var(--grow);
    border: 3px solid var(--surface);
    box-shadow: 0 0 0 1px var(--grow), 0 1px 4px rgba(0,0,0,0.1);
  }
  input[type="range"]::-moz-range-thumb {
    width:18px; height:18px;
    border-radius:50%;
    background: var(--grow);
    border: 3px solid var(--surface);
    cursor: pointer;
  }

  /* Button rows (rate + target age) */
  .btn-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .btn-row + .btn-row {
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: none;
  }
  .btn-group { display:flex; gap:0.4rem; }

  .preset-btn {
    font-family: var(--mono);
    font-size: 0.76rem;
    font-weight: 500;
    padding: 0.35rem 0.8rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.15s;
  }
  .preset-btn:hover {
    border-color: var(--grow);
    color: var(--grow);
  }
  .preset-btn.active {
    background: var(--grow);
    border-color: var(--grow);
    color: #fff;
  }

  .footnote {
    text-align: center;
    font-size: 0.64rem;
    color: var(--text-dim);
    line-height: 1.7;
  }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(6px); }
    to { opacity:1; transform:translateY(0); }
  }
  .main-card, .inputs, .footnote {
    animation: fadeIn 0.35s ease-out both;
  }
  .inputs { animation-delay: 0.05s; }
</style>
</head>
<body>
<div class="app">

  <!-- ── Main card: title + chart + table ── -->
  <div class="main-card">
    <div class="main-header">
      <h1 id="mainTitle">「100歳で0円にする」資産シミュレーター</h1>
      <p class="sub">2つの曲線が交わるところが、取り崩しを始められる時期です。</p>
    </div>
    <div class="chart-legend" id="legend"></div>
    <div class="canvas-wrap">
      <canvas id="chart"></canvas>
    </div>
    <div class="results-inner">
      <h2 class="section-title">取り崩し開始時期</h2>
      <table class="rtable">
        <thead>
          <tr>
            <th>取り崩し額</th>
            <th>開始年齢</th>
            <th>あと何年</th>
            <th>必要資産</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── Input card (bottom) ── -->
  <div class="inputs">
    <h2 class="section-title">あなたの条件</h2>
    <div class="input-row">
      <div class="field">
        <label>
          <span class="field-name">現在の年齢</span>
          <span class="field-val" id="v_age"></span>
        </label>
        <input type="range" id="in_age" min="20" max="60" value="30">
        <span class="field-range">20〜60歳</span>
      </div>
      <div class="field">
        <label>
          <span class="field-name">現在の資産額</span>
          <span class="field-val" id="v_asset"></span>
        </label>
        <input type="range" id="in_asset" min="0" max="10000" step="50" value="500">
        <span class="field-range">0〜10,000万円</span>
      </div>
      <div class="field">
        <label>
          <span class="field-name">毎月の積立額</span>
          <span class="field-val" id="v_save"></span>
        </label>
        <input type="range" id="in_save" min="1" max="50" step="0.5" value="10">
        <span class="field-range">1〜50万円</span>
      </div>
    </div>
    <div class="btn-row">
      <span class="field-name">想定年率</span>
      <div class="btn-group">
        <button class="preset-btn rate-btn" data-rate="4">4%</button>
        <button class="preset-btn rate-btn active" data-rate="8">8%</button>
        <button class="preset-btn rate-btn" data-rate="12">12%</button>
        <button class="preset-btn rate-btn" data-rate="16">16%</button>
      </div>
    </div>
    <div class="btn-row">
      <span class="field-name">目標年齢</span>
      <div class="btn-group">
        <button class="preset-btn age-btn" data-target="80">80歳</button>
        <button class="preset-btn age-btn" data-target="85">85歳</button>
        <button class="preset-btn age-btn" data-target="90">90歳</button>
        <button class="preset-btn age-btn" data-target="95">95歳</button>
        <button class="preset-btn age-btn active" data-target="100">100歳</button>
      </div>
    </div>
  </div>

  <div class="footnote">
    税金・インフレ・手数料は考慮していません。運用リターンは一定と仮定した簡易シミュレーションです。
  </div>

</div>

<script>
let targetAge = 100;
const DRAWDOWNS = [
  { amount: 20, color: '#16a163', label: '20万/月' },
  { amount: 25, color: '#2563eb', label: '25万/月' },
  { amount: 30, color: '#7c3aed', label: '30万/月' },
  { amount: 35, color: '#ea580c', label: '35万/月' },
  { amount: 40, color: '#dc2626', label: '40万/月' },
];

const $ = id => document.getElementById(id);
const ins = { age: $('in_age'), asset: $('in_asset'), save: $('in_save') };
let activeRate = 8;

function fmtMan(v) {
  const n = Math.round(Number(v));
  return n.toLocaleString() + '万円';
}

function compute() {
  const ageNow = +ins.age.value;
  const curAsset = +ins.asset.value;
  const monthlySave = +ins.save.value;
  const annualRate = activeRate / 100;
  const mr = annualRate / 12;
  const totalMonths = (targetAge - ageNow) * 12;

  if (totalMonths <= 0) return { ageNow, totalMonths: 0, growLine: new Float64Array(1), plans: [] };

  const growLine = new Float64Array(totalMonths + 1);
  growLine[0] = curAsset;
  for (let m = 1; m <= totalMonths; m++) {
    growLine[m] = growLine[m - 1] * (1 + mr) + monthlySave;
  }

  const plans = [];
  for (const dd of DRAWDOWNS) {
    const drawLine = new Float64Array(totalMonths + 1);
    drawLine[totalMonths] = 0;
    for (let m = totalMonths - 1; m >= 0; m--) {
      drawLine[m] = (drawLine[m + 1] + dd.amount) / (1 + mr);
    }

    let crossMonth = -1;
    for (let m = 0; m <= totalMonths; m++) {
      if (growLine[m] >= drawLine[m]) { crossMonth = m; break; }
    }

    plans.push({
      ...dd, drawLine, crossMonth,
      crossAge: crossMonth >= 0 ? ageNow + crossMonth / 12 : null,
      neededAsset: crossMonth >= 0 ? Math.round(drawLine[crossMonth]) : null,
      feasible: crossMonth >= 0,
    });
  }
  return { ageNow, totalMonths, growLine, plans };
}

function drawChart(data) {
  const { ageNow, totalMonths, growLine, plans } = data;
  const canvas = $('chart');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  ctx.clearRect(0, 0, W, H);

  if (totalMonths <= 0) return;

  const pad = { top: 24, right: 28, bottom: 36, left: 62 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  const minAge = ageNow;
  const maxAge = targetAge;
  let maxAsset = 100;
  for (const p of plans) { if (p.drawLine[0] > maxAsset) maxAsset = p.drawLine[0]; }

  let lastCrossMonth = 0;
  let allImmediate = true, anyFeasible = false;
  for (const p of plans) {
    if (p.feasible) {
      anyFeasible = true;
      if (p.crossMonth > 0) allImmediate = false;
      if (p.crossMonth > lastCrossMonth) lastCrossMonth = p.crossMonth;
    }
  }
  if (!anyFeasible) lastCrossMonth = totalMonths;
  if (allImmediate && anyFeasible) lastCrossMonth = 0;
  for (let m = 1; m <= lastCrossMonth; m++) { if (growLine[m] > maxAsset) maxAsset = growLine[m]; }

  let yStep = maxAsset > 8000 ? 2000 : 1000;
  maxAsset = Math.ceil(maxAsset / yStep) * yStep;
  if (maxAsset < yStep) maxAsset = yStep;
  const yTicks = Math.round(maxAsset / yStep);

  const xPos = age => pad.left + ((age - minAge) / (maxAge - minAge)) * cw;
  const yPos = asset => pad.top + ch - (Math.max(asset, 0) / maxAsset) * ch;
  const mToAge = m => ageNow + m / 12;

  // Grid
  ctx.strokeStyle = '#eeedea'; ctx.lineWidth = 1;
  for (let i = 0; i <= yTicks; i++) {
    const yy = pad.top + (ch / yTicks) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, yy); ctx.lineTo(W - pad.right, yy); ctx.stroke();
  }

  // Y labels
  ctx.fillStyle = '#a09e99'; ctx.font = '10px "IBM Plex Mono", monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  for (let i = 0; i <= yTicks; i++) {
    const val = maxAsset - yStep * i;
    ctx.fillText(val.toLocaleString(), pad.left - 8, pad.top + (ch / yTicks) * i);
  }
  ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
  ctx.font = '9px "Noto Sans JP", sans-serif'; ctx.fillStyle = '#b5b3ae';
  ctx.fillText('（万円）', pad.left - 4, pad.top - 4);

  // X labels
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = '10px "IBM Plex Mono", monospace';
  const ageSpan = maxAge - minAge;
  const ageStep = ageSpan > 50 ? 10 : 5;
  for (let a = Math.ceil(minAge / ageStep) * ageStep; a <= maxAge; a += ageStep) {
    ctx.fillStyle = '#a09e99';
    ctx.fillText(a, xPos(a), pad.top + ch + 8);
    ctx.strokeStyle = '#f3f2ef'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(xPos(a), pad.top); ctx.lineTo(xPos(a), pad.top + ch); ctx.stroke();
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = '9px "Noto Sans JP", sans-serif'; ctx.fillStyle = '#b5b3ae';
  ctx.fillText('（歳）', xPos(maxAge) + 4, pad.top + ch + 7);

  const step = Math.max(1, Math.floor(totalMonths / 500));

  // Drawdown lines
  for (const p of [...plans].reverse()) {
    ctx.beginPath(); ctx.strokeStyle = p.color + '55'; ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 3]); ctx.lineJoin = 'round';
    let f = true;
    for (let m = 0; m <= totalMonths; m += step) {
      const px = xPos(mToAge(m)), py = yPos(p.drawLine[m]);
      f ? ctx.moveTo(px, py) : ctx.lineTo(px, py); f = false;
    }
    ctx.lineTo(xPos(targetAge), yPos(0)); ctx.stroke(); ctx.setLineDash([]);
    const lm = Math.min(Math.floor(totalMonths * 0.03), 24);
    ctx.save(); ctx.fillStyle = p.color;
    ctx.font = '600 9px "IBM Plex Mono", monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText(p.label, xPos(mToAge(lm)) + 2, yPos(p.drawLine[lm]) - 4);
    ctx.restore();
  }

  // Grow line
  if (lastCrossMonth > 0) {
    const ge = Math.min(lastCrossMonth + Math.floor(totalMonths * 0.05), totalMonths);
    ctx.beginPath(); ctx.moveTo(xPos(minAge), yPos(0));
    for (let m = 0; m <= ge; m += step) ctx.lineTo(xPos(mToAge(m)), yPos(growLine[m]));
    ctx.lineTo(xPos(mToAge(ge)), yPos(growLine[ge]));
    ctx.lineTo(xPos(mToAge(ge)), yPos(0)); ctx.closePath();
    const grd = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
    grd.addColorStop(0, 'rgba(37,99,235,0.08)'); grd.addColorStop(1, 'rgba(37,99,235,0.01)');
    ctx.fillStyle = grd; ctx.fill();

    ctx.beginPath(); ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
    let f = true;
    for (let m = 0; m <= ge; m += step) {
      const px = xPos(mToAge(m)), py = yPos(growLine[m]);
      f ? ctx.moveTo(px, py) : ctx.lineTo(px, py); f = false;
    }
    ctx.lineTo(xPos(mToAge(ge)), yPos(growLine[ge])); ctx.stroke();

    ctx.save(); ctx.fillStyle = '#2563eb';
    ctx.font = '600 9.5px "IBM Plex Mono", monospace';
    ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
    ctx.fillText('資産形成', xPos(mToAge(ge)) - 4, yPos(growLine[ge]) - 6);
    ctx.restore();
  }

  // Cross markers
  for (const p of plans) {
    if (!p.feasible || p.crossMonth === 0) continue;
    const cx = xPos(p.crossAge), cy = yPos(p.drawLine[p.crossMonth]);
    ctx.save(); ctx.strokeStyle = p.color + '40'; ctx.lineWidth = 1;
    ctx.setLineDash([2, 2]);
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, yPos(0)); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();

    ctx.beginPath(); ctx.arc(cx, cy, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.strokeStyle = p.color; ctx.lineWidth = 2; ctx.stroke();

    ctx.save(); ctx.fillStyle = p.color;
    ctx.font = '600 9px "IBM Plex Mono", monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(Math.round(p.crossAge) + '歳', cx, cy - 8);
    ctx.restore();
  }
}

function updateLegend() {
  const el = $('legend');
  let html = '<span><i class="swatch" style="background:#2563eb"></i>資産形成</span>';
  for (const d of DRAWDOWNS) {
    html += `<span><i class="swatch-dash" style="border-color:${d.color}"></i>${d.label}</span>`;
  }
  el.innerHTML = html;
}

function updateTable(data) {
  const { ageNow, plans } = data;
  $('resultBody').innerHTML = plans.map(p => {
    if (!p.feasible) return `<tr>
      <td><span class="dot" style="background:${p.color}"></span>${p.amount}万円/月</td>
      <td class="dim" colspan="3">到達できません</td></tr>`;
    if (p.crossMonth === 0) return `<tr>
      <td><span class="dot" style="background:${p.color}"></span>${p.amount}万円/月</td>
      <td class="bold" style="color:#16a163">今すぐ可</td>
      <td class="dim">—</td>
      <td class="dim">${fmtMan(p.neededAsset)}</td></tr>`;
    const yrs = Math.round(p.crossAge - ageNow);
    return `<tr>
      <td><span class="dot" style="background:${p.color}"></span>${p.amount}万円/月</td>
      <td class="bold">${Math.round(p.crossAge * 10) / 10}歳</td>
      <td class="dim">${yrs}年</td>
      <td class="dim">${fmtMan(p.neededAsset)}</td></tr>`;
  }).join('');
}

function updateTitle() {
  $('mainTitle').textContent = `「${targetAge}歳で0円にする」資産シミュレーター`;
}

function update() {
  $('v_age').textContent = ins.age.value + '歳';
  $('v_asset').textContent = fmtMan(ins.asset.value);
  $('v_save').textContent = ins.save.value + '万円/月';

  // Clamp: if current age >= targetAge, warn
  const ageNow = +ins.age.value;
  if (ageNow >= targetAge) {
    $('resultBody').innerHTML = `<tr><td class="dim" colspan="4">現在の年齢が目標年齢以上です</td></tr>`;
    return;
  }

  const data = compute();
  drawChart(data);
  updateTable(data);
}

// Events
for (const el of Object.values(ins)) el.addEventListener('input', update);

document.querySelectorAll('.rate-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.rate-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeRate = +btn.dataset.rate;
    update();
  });
});

document.querySelectorAll('.age-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    targetAge = +btn.dataset.target;
    updateTitle();
    update();
  });
});

let rt;
window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(update, 80); });

updateLegend();
updateTitle();
update();
</script>
</body>
</html>
